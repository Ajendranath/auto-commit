name: Daily Commit

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "$(date)" >> daily.txt

      - name: Commit and Push
        run: |
          git config user.name "Ajendranath"
          git config user.email "YOUR_VERIFIED_GITHUB_EMAIL"

          git add .
          git commit -m "daily update $(date)" || exit 0

          git push
